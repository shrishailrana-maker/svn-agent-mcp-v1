name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24.18.0
          cache: npm

      - name: Verify LTS runtime
        run: npm run check:runtime

      - name: Install native tools on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes subversion dos2unix

      - name: Install native tools on macOS
        if: runner.os == 'macOS'
        run: |
          brew install subversion dos2unix
          echo "$(brew --prefix subversion)/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm ci --strict-allow-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Prepare local runtime
        run: npm run prepare:local

      - name: Test
        run: npm test -- --runInBand

      - name: Test through MCP client
        run: npm run test:client

      - name: Test packed npm installation
        run: npm run test:package

      - name: Audit dependencies
        if: runner.os == 'Windows'
        run: npm audit --audit-level=moderate
